<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 5rem;
        }

        .btn1 {
            border: 2px solid crimson;
            border-radius: 10px;
            font-size: 2rem;
            padding: 10px 15px;
            color: crimson;
            background-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .btn1::before {
            content: "";
            height: 50px;
            width: 50px;
            background: rgb(178, 7, 98);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: -1;
            border-radius: 50%;
            transition: all 0.3s ease-in-out;
        }

        .btn1:hover::before {
            transform: translate(-50%, -50%) scale(4);
        }

        .btn1:hover {
            color: #fff;
        }

        .btn2 {
            border: 2px solid orchid;
            border-radius: 10px;
            font-size: 2rem;
            padding: 10px 15px;
            color: orchid;
            background-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .btn2::before {
            content: "";
            height: 100%;
            width: 0%;
            position: absolute;
            top: 0;
            left: 0;
            background: rgb(42, 182, 49);
            z-index: -1;
            transition: all 0.5s ease-in-out;
        }

        .btn2:hover::before {
            width: 100%;
        }

        .btn2:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <button class="btn1">Hover me</button>
    <button class="btn2">Hover me too</button>
</body>

</html>
